name: architect
description: SOTA plans, cheap models execute, SOTA validates at the end

steps:
  - role: planner
    sota: true
    prompt_template: "Write a step-by-step implementation plan for: {task}\n\nThe downstream agent is a cheap model that needs EXPLICIT instructions. Your plan must include:\n- Exact file paths to create or modify\n- Exact function/class/variable names\n- Code patterns or snippets where the pattern matters\n- Numbered step-by-step sequence\n- What NOT to change (constraints)\n- Verification steps (grep commands to confirm each change)\n\nBe specific enough that a junior developer could follow it without asking questions."

  - role: implementor
    harness: codex
    model: minimax/MiniMax-M2.7
    turns: 0
    prompt_template: "Follow this plan EXACTLY. Do not deviate or add features not in the plan.\n\nPLAN:\n{plan}\n\nTASK: {task}"

  - role: validator
    harness: codex
    model: glm/glm-5.1
    turns: 0
    prompt_template: "Review the changes against this plan. Verify every item was implemented correctly.\n\nPLAN:\n{plan}\n\nTASK: {task}\n\nReport any deviations or issues. Say LGTM if the plan was followed correctly."
