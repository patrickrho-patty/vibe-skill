name: fix
description: SOTA investigates, MiniMax fixes, GLM validates

steps:
  - role: investigator
    sota: true
    prompt_template: "Investigate this bug and write a detailed fix plan.\n\nBUG: {task}\n\nRead the relevant files, identify the root cause, then write a step-by-step fix plan with:\n- The root cause (exact file, line, and what is wrong)\n- Exact changes needed (file path, function name, what to change and what to change it to)\n- What NOT to touch\n- How to verify the fix (grep or test command)\n\nThe fix will be executed by a cheap model — be explicit and unambiguous."

  - role: fixer
    harness: codex
    model: minimax/MiniMax-M2.7
    turns: 0
    prompt_template: "Apply this fix plan EXACTLY.\n\nFIX PLAN:\n{plan}\n\nBUG: {task}\n\nApply the minimal fix. Do not refactor unrelated code."

  - role: validator
    harness: codex
    model: glm/glm-5.1
    turns: 0
    prompt_template: "Review the fix against this plan.\n\nFIX PLAN:\n{plan}\n\nBUG: {task}\n\nVerify the root cause was addressed and no regressions introduced. Report issues or say LGTM."
