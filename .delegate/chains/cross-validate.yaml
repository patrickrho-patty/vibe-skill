name: cross-validate
description: Same task sent to two models via Pi, orchestrator picks the best result

steps:
  - role: implementor-a
    harness: pi
    model: minimax/MiniMax-M2.7
    turns: 10
    prompt_template: "Implement: {task}\n\nWrite minimal, correct code. Do not over-engineer."

  - role: implementor-b
    harness: pi
    model: zai/glm-5.1
    turns: 10
    prompt_template: "Implement: {task}\n\nWrite minimal, correct code. Do not over-engineer."
