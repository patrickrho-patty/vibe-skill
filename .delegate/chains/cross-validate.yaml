name: cross-validate
description: Same task sent to two models via Codex, orchestrator picks the best result

steps:
  - role: implementor-a
    harness: codex
    model: minimax/MiniMax-M2.7
    turns: 0
    prompt_template: "Implement: {task}\n\nWrite minimal, correct code. Do not over-engineer."

  - role: implementor-b
    harness: codex
    model: glm/glm-5.1
    turns: 0
    prompt_template: "Implement: {task}\n\nWrite minimal, correct code. Do not over-engineer."
