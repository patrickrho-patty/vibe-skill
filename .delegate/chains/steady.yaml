name: steady
description: SOTA plans, MiniMax implements, GLM validates

steps:
  - role: planner
    sota: true
    prompt_template: "Analyze the codebase and write a step-by-step implementation plan for: {task}\n\nThe downstream agent is a cheap model that needs EXPLICIT instructions. Include:\n- Exact file paths to create or modify\n- Exact function/class/variable names\n- Code patterns or snippets where the pattern matters\n- Numbered step-by-step sequence\n- What NOT to change (constraints)\n- Verification steps (grep commands to confirm each change)\n\nBe specific enough that a junior developer could follow it without asking questions."

  - role: implementor
    harness: codex
    model: minimax/MiniMax-M2.7
    turns: 0
    prompt_template: "Follow this plan EXACTLY.\n\nPLAN:\n{plan}\n\nTASK: {task}\n\nFollow existing conventions. Add all necessary imports."

  - role: validator
    harness: codex
    model: glm/glm-5.1
    turns: 0
    prompt_template: "Review the changes against this plan.\n\nPLAN:\n{plan}\n\nTASK: {task}\n\nCheck for bugs, missing imports, duplicate code. Report deviations or say LGTM."
