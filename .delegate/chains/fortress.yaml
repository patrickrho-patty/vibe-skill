name: fortress
description: SOTA plans, MiniMax implements, GLM tests, MiniMax security reviews

steps:
  - role: planner
    sota: true
    prompt_template: "Analyze the codebase and write a step-by-step plan for: {task}\n\nThe downstream agents are cheap models that need EXPLICIT instructions. Include:\n- Exact file paths to create or modify\n- Exact function/class/variable names and signatures\n- Security considerations for each change\n- Numbered step-by-step sequence\n- What NOT to change (constraints)\n- Verification steps\n\nBe specific enough that a junior developer could follow it without asking questions."

  - role: implementor
    harness: codex
    model: minimax/MiniMax-M2.7
    turns: 0
    prompt_template: "Follow this plan EXACTLY.\n\nPLAN:\n{plan}\n\nTASK: {task}\n\nWrite the code. Follow existing conventions. Add imports."

  - role: test-writer
    harness: codex
    model: glm/glm-5.1
    turns: 0
    prompt_template: "Write tests for the changes just made.\n\nPLAN:\n{plan}\n\nTASK: {task}\n\nUse the project's existing test framework. Cover the happy path and one edge case."

  - role: security-reviewer
    harness: codex
    model: minimax/MiniMax-M2.7
    turns: 0
    prompt_template: "Security review the recent changes.\n\nPLAN:\n{plan}\n\nTASK: {task}\n\nCheck for: injection, auth bypass, data leaks, unsafe deserialization, path traversal. Report issues or say CLEAR."
